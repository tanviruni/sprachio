name: sprachio
description: "AI-powered language learning through natural conversation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.0

  # Audio — flutter_sound only (audioplayers removed: conflict)
  flutter_sound: ^9.28.0
  permission_handler: ^11.3.1

  # State management
  provider: ^6.1.2

  # Utilities
  path_provider: ^2.1.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true